<svg
    xmlns="http://www.w3.org/2000/svg"
    width="32"
    height="32"
    viewBox="0 0 32 32"
>
    <defs>
        <linearGradient id="gradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#f22" />
            <stop offset="20%" stop-color="#ff0" />
            <stop offset="40%" stop-color="#2f2" />
            <stop offset="60%" stop-color="#0ff" />
            <stop offset="80%" stop-color="#22f" />
            <stop offset="100%" stop-color="#f0f" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur1" />
            <feGaussianBlur stdDeviation="2" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <path
        d="M 4 4 l 2 8 l 2 -4 l 4 -2 z
        M 28 4 l -2 8 l -2 -4 l -4 -2 z
        M 4 28 l 2 -8 l 2 4 l 4 2 z
        M 28 28 l -2 -8 l -2 4 l -4 2 z
        M 15 11 h 2 v 4 h 4 v 2 h -4 v 4 h -2 v -4 h -4 v -2 h 4 z"
        fill="url(#gradient)"
        stroke="none"
        style="filter: url(#glow)"
    />
    <path
        d="M 4 4 l 2 8 l 2 -4 l 4 -2 z
        M 28 4 l -2 8 l -2 -4 l -4 -2 z
        M 4 28 l 2 -8 l 2 4 l 4 2 z
        M 28 28 l -2 -8 l -2 4 l -4 2 z
        M 15 11 h 2 v 4 h 4 v 2 h -4 v 4 h -2 v -4 h -4 v -2 h 4 z"
        fill="#000"
        stroke="url(#gradient)"
        stroke-width="1"
    />
</svg>
