<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <linearGradient id="g1" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#f00"/><stop offset="100%" stop-color="#ff0"/></linearGradient>
        <linearGradient id="g2" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#ff0"/><stop offset="100%" stop-color="#0f0"/></linearGradient>
        <linearGradient id="g3" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#0f0"/><stop offset="100%" stop-color="#0ff"/></linearGradient>
        <linearGradient id="g4" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#0ff"/><stop offset="100%" stop-color="#00f"/></linearGradient>
        <linearGradient id="g5" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#00f"/><stop offset="100%" stop-color="#f0f"/></linearGradient>
        <linearGradient id="g6" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#f0f"/><stop offset="100%" stop-color="#f0f"/></linearGradient>
        
        <path id="arc-stroke" d="M 28 16 A 12 12 0 0 1 16 28" fill="none" stroke-width="3" stroke-linecap="round"/>
    </defs>
    
    <g id="rainbow-ring-stroke" transform="rotate(12 16 16)" filter="url(#glow)">
        <use href="#arc-stroke" stroke="url(#g1)" transform="rotate(0 16 16)" />
        <use href="#arc-stroke" stroke="url(#g2)" transform="rotate(60 16 16)" />
        <use href="#arc-stroke" stroke="url(#g3)" transform="rotate(120 16 16)" />
        <use href="#arc-stroke" stroke="url(#g4)" transform="rotate(180 16 16)" />
        <use href="#arc-stroke" stroke="url(#g5)" transform="rotate(240 16 16)" />
        <use href="#arc-stroke" stroke="url(#g6)" transform="rotate(300 16 16)" />
    </g>
    
    <circle cx="16" cy="16" r="12" fill="none" stroke="#000" stroke-width="3.5" />
</svg>
