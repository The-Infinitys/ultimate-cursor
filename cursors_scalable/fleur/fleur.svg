        l -5 -2
        z
        M 30 16
        l -5 -5
        l 2 5
        l -2 5
        z
        M 16 12 a 4 4 0 1 0 0.001 0 z

        "
        fill="url(#gradient)"
        stroke="none"
        style="filter: url(#glow)"
    />
    <path
        d="

        M 16 2
        l -5 5
        l 5 -2
        l 5 2
        z
        M 2 16
        l 5 -5
        l -2 5
        l 2 5
        z
        M 16 30
