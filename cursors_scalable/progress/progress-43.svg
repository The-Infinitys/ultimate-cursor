<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <defs>
        <linearGradient id="gradient" x1="0" y1="0" x2="0.2" y2="1">
            <stop offset="0%" stop-color="#f22" /><stop offset="50%" stop-color="#ff0" /><stop offset="60%" stop-color="#2f2" /><stop offset="70%" stop-color="#0ff" /><stop offset="90%" stop-color="#22f" /><stop offset="100%" stop-color="#f0f" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur1" /><feGaussianBlur stdDeviation="2" result="blur2" />
            <feMerge><feMergeNode in="blur1" /><feMergeNode in="blur2" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <linearGradient id="g1" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#f00"/><stop offset="100%" stop-color="#ff0"/></linearGradient>
        <linearGradient id="g2" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#ff0"/><stop offset="100%" stop-color="#0f0"/></linearGradient>
        <linearGradient id="g3" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#0f0"/><stop offset="100%" stop-color="#0ff"/></linearGradient>
        <linearGradient id="g4" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#0ff"/><stop offset="100%" stop-color="#00f"/></linearGradient>
        <linearGradient id="g5" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#00f"/><stop offset="100%" stop-color="#f0f"/></linearGradient>
        <linearGradient id="g6" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#f0f"/><stop offset="100%" stop-color="#f00"/></linearGradient>
        <path id="arc-stroke" d="M 27.5 20 A 7.5 7.5 0 0 1 23.75 26.5" fill="none" stroke-width="1" />
    </defs>
    <path d="M4 4 v 20 l 8 4 l 4 -8 z" fill="url(#gradient)" stroke="none" style="filter: url(#glow)" />
    <path d="M4 4 v 20 l 8 4 l 4 -8 z" fill="#000" stroke="url(#gradient)" stroke-width="1" />
    
    <g id="rainbow-ring-stroke" transform="rotate(252 20 20)" filter="url(#glow)">
       <use href="#arc-stroke" stroke="url(#g1)" transform="rotate(0 20 20)" />
       <use href="#arc-stroke" stroke="url(#g2)" transform="rotate(60 20 20)" />
       <use href="#arc-stroke" stroke="url(#g3)" transform="rotate(120 20 20)" />
       <use href="#arc-stroke" stroke="url(#g4)" transform="rotate(180 20 20)" />
       <use href="#arc-stroke" stroke="url(#g5)" transform="rotate(240 20 20)" />
       <use href="#arc-stroke" stroke="url(#g6)" transform="rotate(300 20 20)" />
    </g>
    
    <circle cx="20" cy="20" r="7.5" fill="none" stroke="#000" stroke-width="1" />
</svg>
