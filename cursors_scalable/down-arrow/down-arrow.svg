<svg
    xmlns="http://www.w3.org/2000/svg"
    width="32"
    height="32"
    viewBox="0 0 32 32"
>
    <defs>
        <linearGradient id="gradient" x1="0" y1="0" x2="0.2" y2="1">
            <stop offset="0%" stop-color="#f22" />
            <stop offset="50%" stop-color="#ff0" />
            <stop offset="60%" stop-color="#2f2" />
            <stop offset="70%" stop-color="#0ff" />
            <stop offset="90%" stop-color="#22f" />
            <stop offset="100%" stop-color="#f0f" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur1" />
            <feGaussianBlur stdDeviation="2" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <path
        d="
        M16 28
        l 11 -17
        l -3 2
        l -8 8
        l -8 -8
        l -3 -2
        z
        "
        fill="url(#gradient)"
        stroke="none"
        style="filter: url(#glow)"
    />
    <path
        d="
        M16 28
        l 11 -17
        l -3 2
        l -8 8
        l -8 -8
        l -3 -2
        z
        "
        fill="#000"
        stroke="url(#gradient)"
        stroke-width="1"
    />
</svg>
